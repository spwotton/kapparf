openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: KAPPA Heartbeat Tracker API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: devices
    description: Device management
  - name: heartbeat
    description: Heartbeat operations
  - name: sensors
    description: Sensor data
  - name: alerts
    description: Alert management
  - name: kappa
    description: KAPPA integration
  - name: agents
    description: Agent scripts
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /devices/register:
    post:
      operationId: registerDevice
      tags: [devices]
      summary: Register or update a device
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterDeviceBody"
      responses:
        "200":
          description: Device registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceInfo"

  /devices:
    get:
      operationId: listDevices
      tags: [devices]
      summary: List all devices
      parameters:
        - name: type
          in: query
          schema:
            type: string
        - name: online
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of devices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeviceInfo"

  /devices/stats:
    get:
      operationId: getDeviceStats
      tags: [devices]
      summary: Get device statistics
      responses:
        "200":
          description: Device stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceStats"

  /devices/{deviceId}:
    get:
      operationId: getDevice
      tags: [devices]
      summary: Get device details
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Device details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceDetail"
        "404":
          description: Device not found
    delete:
      operationId: deleteDevice
      tags: [devices]
      summary: Delete a device
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Device deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
                required:
                  - deleted

  /heartbeat:
    post:
      operationId: sendHeartbeat
      tags: [heartbeat]
      summary: Send a heartbeat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HeartbeatBody"
      responses:
        "200":
          description: Heartbeat acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeartbeatAck"

  /heartbeat/{deviceId}/history:
    get:
      operationId: getHeartbeatHistory
      tags: [heartbeat]
      summary: Get heartbeat history
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
        - name: hours
          in: query
          schema:
            type: integer
            default: 24
        - name: limit
          in: query
          schema:
            type: integer
            default: 1000
      responses:
        "200":
          description: Heartbeat history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HeartbeatRecord"

  /sensors:
    post:
      operationId: ingestSensors
      tags: [sensors]
      summary: Ingest sensor readings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestSensorsBody"
      responses:
        "200":
          description: Sensor data ingested
          content:
            application/json:
              schema:
                type: object
                properties:
                  ingested:
                    type: integer
                required:
                  - ingested

  /sensors/{deviceId}:
    get:
      operationId: getSensorReadings
      tags: [sensors]
      summary: Get sensor readings for a device
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
        - name: hours
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 500
      responses:
        "200":
          description: Sensor readings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SensorReading"

  /sensors/{deviceId}/latest:
    get:
      operationId: getLatestSensors
      tags: [sensors]
      summary: Get latest sensor reading per type
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Latest sensor readings
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: "#/components/schemas/SensorReading"

  /alerts:
    get:
      operationId: listAlerts
      tags: [alerts]
      summary: List alerts
      parameters:
        - name: deviceId
          in: query
          schema:
            type: string
        - name: severity
          in: query
          schema:
            type: integer
        - name: acknowledged
          in: query
          schema:
            type: boolean
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Alerts list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"

  /alerts/active:
    get:
      operationId: getActiveAlerts
      tags: [alerts]
      summary: Get unacknowledged alerts
      responses:
        "200":
          description: Active alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"

  /alerts/{id}/acknowledge:
    post:
      operationId: acknowledgeAlert
      tags: [alerts]
      summary: Acknowledge an alert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Alert acknowledged
          content:
            application/json:
              schema:
                type: object
                properties:
                  acknowledged:
                    type: boolean
                required:
                  - acknowledged

  /kappa/status:
    get:
      operationId: getKappaStatus
      tags: [kappa]
      summary: Full system summary for KAPPA
      responses:
        "200":
          description: System status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KappaStatus"

  /kappa/command:
    post:
      operationId: sendCommand
      tags: [kappa]
      summary: Send command to device via WebSocket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommandBody"
      responses:
        "200":
          description: Command result
          content:
            application/json:
              schema:
                type: object
                properties:
                  sent:
                    type: boolean
                required:
                  - sent

  /agents/pc:
    get:
      operationId: getPcAgent
      tags: [agents]
      summary: Download PC agent script
      responses:
        "200":
          description: Python script
          content:
            text/plain:
              schema:
                type: string

  /agents/phone:
    get:
      operationId: getPhoneAgent
      tags: [agents]
      summary: Download phone agent script
      responses:
        "200":
          description: Python script for Termux
          content:
            text/plain:
              schema:
                type: string

  /agents/bash:
    get:
      operationId: getBashAgent
      tags: [agents]
      summary: Download bash heartbeat script
      responses:
        "200":
          description: Bash script
          content:
            text/plain:
              schema:
                type: string

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    RegisterDeviceBody:
      type: object
      properties:
        deviceId:
          type: string
        name:
          type: string
        type:
          type: string
        os:
          type: string
        capabilities:
          type: array
          items:
            type: string
        metadata:
          type: object
      required:
        - deviceId
        - name
        - type
        - os

    DeviceInfo:
      type: object
      properties:
        id:
          type: string
        deviceId:
          type: string
        name:
          type: string
        type:
          type: string
        os:
          type: string
        online:
          type: boolean
        ip:
          type: ["string", "null"]
        capabilities:
          type: array
          items:
            type: string
        registeredAt:
          type: string
          format: date-time
        lastHeartbeat:
          type: ["string", "null"]
          format: date-time
        lastDisconnect:
          type: ["string", "null"]
          format: date-time
      required:
        - id
        - deviceId
        - name
        - type
        - os
        - online
        - capabilities
        - registeredAt

    DeviceDetail:
      type: object
      properties:
        id:
          type: string
        deviceId:
          type: string
        name:
          type: string
        type:
          type: string
        os:
          type: string
        online:
          type: boolean
        ip:
          type: ["string", "null"]
        capabilities:
          type: array
          items:
            type: string
        metadata:
          type: object
        registeredAt:
          type: string
          format: date-time
        lastHeartbeat:
          type: ["string", "null"]
          format: date-time
        lastDisconnect:
          type: ["string", "null"]
          format: date-time
        recentHeartbeats:
          type: array
          items:
            $ref: "#/components/schemas/HeartbeatRecord"
        activeAlerts:
          type: array
          items:
            $ref: "#/components/schemas/Alert"
      required:
        - id
        - deviceId
        - name
        - type
        - os
        - online
        - capabilities
        - metadata
        - registeredAt
        - recentHeartbeats
        - activeAlerts

    DeviceStats:
      type: object
      properties:
        total:
          type: integer
        online:
          type: integer
        offline:
          type: integer
        byType:
          type: object
          properties:
            pc:
              type: integer
            phone:
              type: integer
            sensor:
              type: integer
            iot:
              type: integer
          required:
            - pc
            - phone
            - sensor
            - iot
        uptimePercent24h:
          type: number
      required:
        - total
        - online
        - offline
        - byType
        - uptimePercent24h

    HeartbeatBody:
      type: object
      properties:
        deviceId:
          type: string
        metadata:
          type: object
      required:
        - deviceId

    HeartbeatAck:
      type: object
      properties:
        ack:
          type: boolean
        serverTime:
          type: number
        nextExpectedMs:
          type: number
      required:
        - ack
        - serverTime
        - nextExpectedMs

    HeartbeatRecord:
      type: object
      properties:
        id:
          type: string
        deviceId:
          type: string
        timestamp:
          type: string
          format: date-time
        latencyMs:
          type: ["number", "null"]
        metadata:
          type: object
      required:
        - id
        - deviceId
        - timestamp
        - metadata

    IngestSensorsBody:
      type: object
      properties:
        deviceId:
          type: string
        readings:
          type: array
          items:
            type: object
            properties:
              sensorType:
                type: string
              timestamp:
                type: number
              values:
                type: object
            required:
              - sensorType
              - timestamp
              - values
      required:
        - deviceId
        - readings

    SensorReading:
      type: object
      properties:
        id:
          type: string
        deviceId:
          type: string
        sensorType:
          type: string
        timestamp:
          type: string
          format: date-time
        values:
          type: object
      required:
        - id
        - deviceId
        - sensorType
        - timestamp
        - values

    Alert:
      type: object
      properties:
        id:
          type: string
        deviceId:
          type: string
        type:
          type: string
        message:
          type: string
        severity:
          type: integer
        metadata:
          type: object
        createdAt:
          type: string
          format: date-time
        acknowledged:
          type: boolean
      required:
        - id
        - deviceId
        - type
        - message
        - severity
        - metadata
        - createdAt
        - acknowledged

    KappaStatus:
      type: object
      properties:
        devices:
          type: array
          items:
            $ref: "#/components/schemas/DeviceInfo"
        onlineCount:
          type: integer
        alerts:
          type: array
          items:
            $ref: "#/components/schemas/Alert"
        recentHeartbeats:
          type: object
          additionalProperties:
            type: object
            properties:
              lastSeen:
                type: string
                format: date-time
              latencyMs:
                type: ["number", "null"]
              metadata:
                type: object
            required:
              - lastSeen
              - metadata
        serverUptime:
          type: number
      required:
        - devices
        - onlineCount
        - alerts
        - recentHeartbeats
        - serverUptime

    CommandBody:
      type: object
      properties:
        deviceId:
          type: string
        command:
          type: string
        args:
          type: object
      required:
        - deviceId
        - command
